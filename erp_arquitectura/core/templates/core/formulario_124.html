{% extends 'base.html' %}
{% block content %}
<section class="contacto">
    <h2 class="logo" style="font-size: 1.5rem;">Generador Formulario 124</h2>
    
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form method="post" enctype="multipart/form-data" style="margin-top: 20px;">
        {% csrf_token %}
        <label>Subir Excel de datos:</label>
        <input type="file" name="excel" accept=".xlsx, .xls" required>
        <br><br>
        <button type="submit" class="btn-verde">Procesar y Descargar PDF</button>
    </form>
</section>
{% endblock %}
