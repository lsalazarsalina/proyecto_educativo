<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenid@s</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <style>
        /* Fuerza el centrado de todo el cuerpo */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centra todo el contenido de la página */
            text-align: center;  /* Centra todos los textos */
        }

        /* Navbar y Header */
        header, .navbar {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-img {
            width: 250px; /* Tu tamaño deseado */
            height: auto;
            margin-top: 20px;
        }

        .logo {
            width: 100%;
            text-align: center;
            margin: 20px 0;
        }

        .menu {
            display: flex;
            justify-content: center;
            list-style: none;
            padding: 0;
            gap: 20px;
        }

        /* Sección Hero (Imagen de Melipilla y textos) */
        .hero {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .hero-content {
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center; /* ESTO centra la imagen, el h2 y el p */
            margin: 0 auto;
        }

        /* Ajuste para que los párrafos no se vean tan anchos */
        p {
            max-width: 600px;
            margin: 10px auto;
        }

        /* Grid de servicios centrada */
        .grid-servicios {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
        }

        /* Botón verde */
        .btn-verde {
            background-color: #2d5a27;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
    </style>
